<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="From Writing Code to Orchestrating Agents - My SDE Transformation - Sushobhit Rajan">
    <title>SDE Transformation | Sushobhit Rajan</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/src/styles/main.css">

    <style>
        #app {
            opacity: 0;
        }

        #app.loaded {
            opacity: 1;
            transition: opacity 0.3s ease-in;
        }

        .page-wrapper {
            padding-top: 120px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .article-container {
            max-width: 900px;
            width: 100%;
            padding: 0 2rem 4rem 2rem;
            color: var(--color-text);
            line-height: 1.8;
        }

        .article-container h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            margin-bottom: 1.5rem;
            font-weight: 800;
            line-height: 1.2;
        }

        .article-container h2 {
            font-size: 1.8rem;
            margin-top: 3rem;
            margin-bottom: 1.2rem;
            color: var(--color-text);
            font-weight: 700;
        }

        .article-container p {
            margin-bottom: 1.5rem;
            color: var(--color-text-secondary);
        }

        .article-container ul {
            margin-bottom: 2rem;
            padding-left: 1.5rem;
        }

        .article-container li {
            margin-bottom: 0.75rem;
            color: var(--color-text-secondary);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            margin-bottom: 3rem;
            color: var(--color-accent);
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s ease;
        }

        .back-btn:hover {
            transform: translateX(-5px);
        }

        .mermaid {
            display: flex;
            justify-content: center;
            margin: 2rem 0;
        }

        /* Dark mode support for mermaid */
        [data-theme="dark"] .mermaid {
            filter: invert(0.9) hue-rotate(180deg);
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script type="module" src="/src/topic-sde-transformation.js"></script>
</body>

</html>
