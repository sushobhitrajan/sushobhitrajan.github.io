<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Personal portfolio of Sushobhit Rajan - Software Engineering & Machine Learning">
  <meta name="author" content="Sushobhit Rajan">
  <title>Sushobhit Rajan | Software Engineering & Machine Learning</title>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">

  <!-- Preconnect to fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Main CSS -->
  <link rel="stylesheet" href="/src/styles/main.css">

  <style>
    /* Hide loading content immediately */
    #app {
      opacity: 0;
    }

    /* Show content once JS loads */
    #app.loaded {
      opacity: 1;
      transition: opacity 0.3s ease-in;
    }

    /* Base theme colors */
    body {
      background-color: #FFFFFF;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    body[data-theme="dark"] {
      background-color: #020617;
    }
  </style>

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://sushobhitrajan.in/">
  <meta property="og:title" content="Sushobhit Rajan | AI Agents & LLM Engineering">
  <meta property="og:description" content="Personal portfolio of Sushobhit Rajan - Software Engineering & Machine Learning. Building the next generation of intelligent systems.">
  <meta property="og:image" content="https://sushobhitrajan.in/assets/og-image.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://sushobhitrajan.in/">
  <meta property="twitter:title" content="Sushobhit Rajan | AI Agents & LLM Engineering">
  <meta property="twitter:description" content="Personal portfolio of Sushobhit Rajan - Software Engineering & Machine Learning. Building the next generation of intelligent systems.">
  <meta property="twitter:image" content="https://sushobhitrajan.in/assets/og-image.png">

  <!-- Theme Color -->
  <meta name="theme-color" content="#FFFFFF" id="theme-meta">

</head>
<body>
  <!-- Main application container -->
  <div id="app"></div>

  <!-- Main JavaScript entry point -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
